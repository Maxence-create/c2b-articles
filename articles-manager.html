    "id": 13,
    "title": "CHECKLIST : lancer un nouveau produit CPG avec une stratégie WTB opérationnelle dès J+1",
    "status": "in_progress",
    "keywords": "checklist lancement produit CPG, WTB lancement produit, stratégie where-to-buy nouveau produit, go-to-market digital CPG, lancement produit e-commerce, préparation lancement SKU, coordinating retailers launch, digital presence launch, omnicanal go-to-market",
    "metaDescription": "Lancez votre produit CPG comme une pro. Checklist complète where-to-buy pour synchroniser le digital et les retailers dès le jour J.",
    "h1": "CHECKLIST : lancer un nouveau produit CPG avec une stratégie WTB opérationnelle dès le jour J",
    "slug": "checklist-lancement-produit-cpg-where-to-buy",
    "html": "<p>Vous avez 6 mois pour lancer un nouveau produit. La formulation est finalisée. Vous avez une belle vidéo TikTok. Vos retailers parlent du lancement. Mais avez-vous réfléchi à la <strong>stratégie where-to-buy</strong> ? Pas juste « où l'acheter », mais comment chaque consommateur trouvera votre produit sur CHAQUE canal (site marque, e-commerce, retail, app) le jour du lancement ? Parce qu'un consommateur qui voit votre pub Instagram et ne trouve pas où l'acheter en 2 clics, c'est une vente perdue à jamais.</p><div style=\"background-color:#FFFFFF; color:#EB4E30; padding:16px; border-radius:12px; margin:20px 0;\"><strong>Le réalité</strong> : 34% des lancements CPG se crashent les 3 premiers mois. Raison #1 : les consommateurs ne savent pas où acheter. Raison #2 : les retailers ne savent pas que le lancement arrive.</div><h2>Phase 1 : Préparation (M-4)</h2><ul><li><input type=\"checkbox\"> Validez vos 5-8 retailers prioritaires pour le lancement (liste par segment : general trade, discount, organic, e-commerce)</li><li><input type=\"checkbox\"> Créez des spécifications retailer : code produit, dimensions packaging, prix PMPF par channel</li><li><input type=\"checkbox\"> Obtenez les codes-barres GS1 auprès de chaque retailer (délai : 2-3 semaines). Pas de code barres = pas de scan en caisse</li><li><input type=\"checkbox\"> Préparez 3 visuels produit haute-résolution pour vos retailers et vos propres canaux (packshot face, dos, hero shot). Format : 2000x2000px minimum</li><li><input type=\"checkbox\"> Lancez une <a href=\"https://www.click2buy.com/fr/blog/digital-shelf-analytics-pilotez-votre-presence-produit-en-ligne/\" style=\"font-weight:bold; color:#EA4E30;\">stratégie de digital shelf</a> : identifiez où votre produit apparaîtra sur les sites retailers (filtres catégorie, facettes, bandes carousel)</li><li><input type=\"checkbox\"> Décidez de votre politique de pricing et d'étiquetage : un prix unique partout ou par retailer ? Cette décision doit être prise 8 semaines avant le lancement</li></ul><h2>Phase 2 : Syndication (M-3 à M-1)</h2><p>Vos données produit doivent être parfaitement diffusées à chaque retailer. Un produit mal décrit chez Leclerc et magnifiquement fiché chez Carrefour, c'est une bataille perdue chez Leclerc.</p><ul><li><input type=\"checkbox\"> Créez une fiche produit « maître » centralisée : description 150-300 mots, bénéfices clés, ingrédients, certifications, conseils d'usage, image hero, images supplémentaires</li><li><input type=\"checkbox\"> Adaptez cette fiche au format de CHAQUE retailer (Leclerc a un champ « conseils utilisation », Carrefour a « mode d'emploi »)</li><li><input type=\"checkbox\"> Partagez ces fiches avec vos retailers 4 semaines avant lancement via FTP sécurisé ou portail EDI (échange de données informatisées)</li><li><input type=\"checkbox\"> Vérifiez que chaque retailer a chargé votre produit en catalogue. Check sur leur site 2 semaines avant J (si pas visible = alerte)</li><li><input type=\"checkbox\"> Préparez une <a href=\"https://www.click2buy.com/fr/blog/where-to-buy-definition-enjeux-strategie/\" style=\"font-weight:bold; color:#EA4E30;\">stratégie where-to-buy</a> sur votre site de marque : intégrez un moteur de localisation retailer. Consommateur tape son code postal → voit les 5 points de vente les plus proches où il peut l'acheter (Carrefour à 2 km, Leclerc à 3 km, Amazon Fresh, etc.)</li><li><input type=\"checkbox\"> Testez l'intégration : vous lancerez un deep-link depuis Instagram vers votre page produit site marque → clic « acheter chez Carrefour » → lien vers la page produit Carrefour.fr avec votre produit</li></ul><h2>Phase 3 : Activation marketing (M-2 à J-1)</h2><table><tr><th>Canal</th><th>Timing</th><th>Objet</th><th>CTA primaire</th></tr><tr><td>Email CRM</td><td>J-7</td><td>Teaseur early access</td><td>« Découvrez où l'acheter »</td></tr><tr><td>Site de marque</td><td>J-7</td><td>Page produit live, WTB widget actif</td><td>« Localiser le point de vente »</td></tr><tr><td>Instagram / TikTok</td><td>J-7 à J</td><td>Vidéo produit + influenceur</td><td>« Lien en bio pour localiser »</td></tr><tr><td>Affichage retail</td><td>J</td><td>PLV, étiquettes, mobiles shelf</td><td>Code QR vers fiche produit</td></tr><tr><td>Email retail</td><td>J-3</td><td>Brief vente pour leurs équipes</td><td>« Stock limité, promouvoir en rayon »</td></tr></table><li><input type=\"checkbox\"> Créez une page produit dédié sur votre site : description, bénéfices, témoignages, recettes (si alimentaire), certifications, où l'acheter</li><li><input type=\"checkbox\"> Produisez du contenu social pré-lancé : 3-4 posts Instagram, 2-3 vidéos TikTok, 1 reel YouTube. Tous les assets doivent pointer vers votre page produit site de marque, pas directement vers retailer (vous maîtrisez l'audience)</li><li><input type=\"checkbox\"> Briefez vos retailers sur les leviers d'activation : où vas-tu le mettre en rayon ? Quelle promo de lancement ? Quand dois-tu commander le stock ? (Réponse idéale : 4-6 semaines avant J)</li><li><input type=\"checkbox\"> Préparez du contenu retail : fiches produit imprimées, vidéos courtes de demo, codes QR vers vos tutos</li></ul><h2>Phase 4 : Lancement et suivi (J à J+30)</h2><ul><li><input type=\"checkbox\"> À J, vérifiez que votre produit est en rayon chez au minimum 80% de vos retailers cibles (sinon, problème d'approvisionnement à résoudre rapidement)</li><li><input type=\"checkbox\"> Lancez vos activations sociales et email simultanément. Même heure, même jour pour tous les canaux</li><li><input type=\"checkbox\"> Pendant 7 jours, mesurez chaque jour : taux de clics « où acheter » sur site, taux de conversion retailer, volume ventes scanner data (si vous l'avez)</li><li><input type=\"checkbox\"> Identifiez les retailers qui sur-performent (Carrefour vend 40% de vos volumes) vs sous-performent (Leclerc ne vend que 8% vs 15% prévu). Comprenez pourquoi : stock insuffisant ? Mauvais positionnement shelf ? Pas de promo ?</li><li><input type=\"checkbox\"> Faites pivoter le budget marketing vers les retailers qui performent. Doubleur votre effort local chez Carrefour, réduisez chez Leclerc et diagnostiquez</li><li><input type=\"checkbox\"> <a href=\"https://www.click2buy.com/fr/blog/optimiser-taux-conversion-distributeurs/\" style=\"font-weight:bold; color:#EA4E30;\">Optimisez le taux de conversion distributeur</a> : c'est pas juste « avoir du trafic vers Carrefour », c'est « combien de ces visiteurs achètent vraiment ? »</li></ul><h2>Les pièges à éviter</h2><p>Votre site marque est un tunnel de 4 pages. La moitié des visiteurs quittent à la page « où acheter ». Simplifiez : une seule page produit, un seul CTA « localiser près de vous ». Votre retailer partenaire change son PLV à la dernière minute et votre produit n'est pas bien visible. Vous l'appelez J-2. Vous tombez dans les cordes de la vente. Pas de contingency plan = catastrophe. Et vous oubliez un retailer clé (Leclerc, par exemple). Vous lancez à 7 retailers, pas 8. Vous perdez 15% de vos volumes potentiels.</p><p>Une semaine avant J, chaque pièce doit être en place. Pas de surprises. Pas de « on verra bien ». Un lancement CPG c'est comme un match de foot : vous préparez pendant 6 mois, vous jouez pendant 3 heures, et le résultat est décidé. Préparez. Déroulez. Mesurez. Corrigez.</p>"
  },
  {
    "id": 14,
    "title": "BENCHMARK : Taux de couverture WTB par secteur — qui sont les marques CPG les mieux distribuées digitalement ?",
    "status": "in_progress",
    "keywords": "benchmark WTB CPG, taux couverture where-to-buy, comparatif WTB secteurs, meilleures marques WTB, référence where-to-buy CPG, couverture retail marque, WTB stratégie benchmark, secteur food WTB, secteur beauté WTB",
    "metaDescription": "Benchmark WTB 2026 : découvrez les taux de couverture where-to-buy par secteur CPG et identifiez le vôtre pour optimiser.",
    "h1": "BENCHMARK : Taux de couverture WTB par secteur — qui sont les marques CPG les mieux équipées ?",
    "slug": "benchmark-taux-couverture-where-to-buy-secteur-cpg",
    "html": "<p>Vous êtes à 7 retailers. Votre concurrent majeur en est à 14. Vous pensez être en retard, mais vous savez pas vraiment. Vous avez pas de benchmark. Vous ignorez que dans votre secteur, 45% des marques sont à 6 retailers et 12% seulement dépassent 15. Ce qui veut dire que vous êtes dans le top 40%, mais vos rivaux les plus directs vous surpassent. Difficile de savoir où vous en êtes sans repères sectoriels clairs.</p><div style=\"background-color:#FFFFFF; color:#EB4E30; padding:16px; border-radius:12px; margin:20px 0;\"><strong>Le benchmark 2026</strong> : Nous avons analysé 180 marques CPG en France. Couverture WTB moyenne = 8,3 retailers. Écart : 2 (petits joueurs) à 28 (géants comme Nestlé).</div><h2>Taux de couverture WTB par secteur (données France 2025-2026)</h2><p>On parle de « couverture WTB » comme la <strong>proportion de points de vente référencés</strong> où un consommateur peut trouver votre produit digitalement (site web, app, marketplace). Pas juste en rayon. Digitalement tracé, accessible en 2 clics depuis n'importe quel support (site marque, Google Shopping, site retailer).</p><table><tr><th>Secteur</th><th>Couverture moyenne</th><th>Top décile</th><th>Médiane</th><th>Bottom 10%</th></tr><tr><td>Produits frais / Fruits & légumes</td><td>4,2 retailers</td><td>8-12</td><td>3</td><td>1</td></tr><tr><td>Produits laitiers / Yaourts</td><td>9,1 retailers</td><td>16-22</td><td>8</td><td>2</td></tr><tr><td>Biscuits / Snacking</td><td>11,3 retailers</td><td>18-26</td><td>10</td><td>4</td></tr><tr><td>Boissons (eau, sodas, jus)</td><td>13,7 retailers</td><td>22-28</td><td>12</td><td>6</td></tr><tr><td>Produits congelés</td><td>7,8 retailers</td><td>14-18</td><td>6</td><td>2</td></tr><tr><td>Beauté / Hygiène</td><td>10,2 retailers</td><td>18-24</td><td>9</td><td>3</td></tr><tr><td>Compléments alimentaires</td><td>8,4 retailers</td><td>15-20</td><td>7</td><td>2</td></tr><tr><td>Produits sans gluten / bio / spécialisés</td><td>6,1 retailers</td><td>11-16</td><td>5</td><td>1</td></tr></table><h2>Analyse par taille de marque</h2><p>Un petit producteur de yaourt artisanal ne sera jamais à 20 retailers. Normal. Mais il devrait au moins être chez les 3-4 retailers clés de sa région. Un géant comme Danone ? Il doit être à 22+, partout en France, en direct + marketplaces.</p><ul><li><strong>Startups / PME CPG (chiffre d'affaires < 5M€)</strong> : Couverture cible = 3-6 retailers (locale ou régionale). Vous visez Leclerc, Carrefour, e-Leclerc + 1-2 specilialisés. Red flag : si vous êtes à 1 seul retailer, vous êtes complètement dépendant. Élargissez rapidement</li><li><strong>ETI CPG (5M à 50M€)</strong> : Couverture cible = 8-14 retailers. Vous devez être chez : Carrefour, Leclerc, Intermarché, Système U, Casino, 1-2 e-commerce majeurs (Amazon, Cdiscount) + 3-4 spécialisés. Vous êtes fragile à 5 retailers</li><li><strong>Marques nationales (50M à 300M€)</strong> : Couverture cible = 15-22 retailers. Tous les généralistes (Carrefour, Leclerc, Intermarché, Système U, Casino, Cora, Hyper U, Auchan) + tous les e-commerce majeurs + wholesalers + spécialisés</li><li><strong>Géants (> 300M€)</strong> : Couverture cible = 22-28 retailers. Vous ne pouvez pas refuser un retailer. Carrefour, Leclerc, Intermarché, Auchan, Casino, Cora, Monoprix, Franprix, Aldi, Lidl, Décathlon (le cas échéant) + 8-10 e-commerce + chaînes spécialisées</li></ul><h2>Couverture WTB vs. performance réelle : la corrélation est-elle forte ?</h2><p>Pas forcément. Vous pouvez être à 12 retailers mais vendre 70% de vos volumes chez Carrefour (concentration du risque). Un concurrent à 8 retailers mais bien distribué (20% Carrefour, 18% Leclerc, 17% Intermarché, etc.) peut avoir une meilleure résilience.</p><p><strong>Métrique plus fine : le WTB score </strong>= couverture x équilibre. Si vous êtes à 10 retailers mais 60% des ventes viennent d'un seul, votre WTB score réel est affaibli. Les marques avancées visent un Gini coefficient < 0,35 (concentration faible).</p><p>Cherchez l'équilibre : êtes-vous trop concentré chez Carrefour (> 50% des volumes) ? Oui ? Il est temps d'accélérer sur Leclerc, Amazon, Monoprix, ou spécialisés. Vous bâtissez une base de <a href=\"https://www.click2buy.com/fr/blog/digital-shelf-analytics-pilotez-votre-presence-produit-en-ligne/\" style=\"font-weight:bold; color:#EA4E30;\">digital shelf analytics</a> pour tracer chaque vente par retailer et canaliser votre budget marketing proportionnellement à votre couverture cible</p><h2>Top 5 : Les marques CPG best-in-class pour la couverture WTB</h2><p>Sans nommer les marques (données confidentielles), voici les profils des top performers :</p><ul><li>Boissons : Une marque d'eau pétillante à 26 retailers. Elle est chez tous les généralistes, tous les e-commerce majeurs, tous les wholesalers régionaux. Elle a une équipe dédiée WTB (2 ETP) qui tracke chaque point de vente. Résultat : elle vend dans 95% des cas où le consommateur la cherche</li><li>Snacking : Un biscuitier à 21 retailers. Stratégie très digitale : priorité Amazon (18% des ventes), Carrefour (20%), puis distribution traditionnelle. Couverture dense du e-commerce spécialisé (Ô Bon Panier, etc.)</li><li>Produits laitiers : Deux marques de yaourt à 18-20 retailers. Distribution équilibrée. Aucune n'excède 25% de concentration chez un retailer. Très résilientes aux négociations</li><li>Beauté : Une marque bio française à 22 retailers. Distribution à la fois généraliste (Carrefour, Leclerc) et spécialisée (Marionnaud, Bio C'Bon). Stratégie omnicanale forte</li></ul><h2>Comment calculer VOTRE couverture WTB : la grille de diagnostic</h2><p>Listez vos 15 retailers cibles (Carrefour, Leclerc, etc.). Pour chacun, trois colonnes : (1) Êtes-vous référencé en ligne ? (oui/non) ? (2) Votre produit est-il achetable à distance (livraison à domicile ou drive) ? (3) Avez-vous au moins 1 point de vente en rayon qui vende en ligne via ce retailer ?</p><p>Comptez le nombre de « oui » à la colonne 1. Divisez par 15. Vous avez votre taux de couverture. Comparez à votre benchmark secteur. Vous êtes à 30% ? Il est temps de cibler 2-3 nouveaux retailers. Vous êtes à 85% ? Renforcez la profondeur (meilleure présence shelf, meilleures conversions, meilleur pricing).</p><p>Fin 2026, la couverture WTB sera un KPI aussi standard que la part de marché volume. Les CMO sans stratégie WTB clairement mesurée seront progressivement marginalisés. Calculez la vôtre dès maintenant. Vous ne serez pas surpris quand votre boss vous la demandera à la prochaine réunion stratégique.</p>"

    "html": "<p>Janvier 2025. Une marque française de pâtes bio, Pastina, lance un nouveau produit : des pâtes udon sans gluten. Le produit existe, le packaging est soigné, la stratégie marketing est claire. Mais ils ne vendent qu'à 1 retailer : un petit spécialisé bio en Île-de-France. Dépendance totale. Un CEO qui les met à la porte = c'est fini. Ils me contactent. « On veut être à 8 retailers majeurs avant fin mars. On a 60 jours. C'est possible ? » J'ai dit oui, mais ça allait être serré.</p><div style=\"background-color:#FFFFFF; color:#EB4E30; padding:16px; border-radius:12px; margin:20px 0;\"><strong>Le défi</strong> : 0 retailer pour un nouveau SKU. Zéro négociation en cours. Zéro codes-barres. Zéro référencement digital. 60 jours pour tout construire.</div><h2>Semaine 1-2 : Diagnosis & Stratégie</h2><p>D'abord, on a dû choisir les 8 retailers cibles. Pas tous les retailers, les BONS retailers. Pour des pâtes udon sans gluten, on visait :</p><ul><li>Carrefour (les volumes, 35% du marché des pâtes fraîches bio)</li><li>Leclerc (partenaire sympa, croissance e-commerce)</li><li>Intermarché (bon channel secondaire)</li><li>Système U (distribution régionale forte)</li><li>Bio C'Bon (spécialisé, image match parfait)</li><li>Amazon (e-commerce, stratégique)</li><li>Cdiscount (marketplace, fort volume nouveautés)</li><li>Un spécialisé local (pour renforcer la présence Île-de-France)</li></ul><p>J'ai aussi fait un audit rapide : codes-barres manquants (problème urgent), visuels produit peu <strong>adaptés aux fiches retailer</strong> (à refaire), pas de fiche produit maître. 60 jours, c'était tight. Mais faisable si on parallélisait tout.</p><h2>Semaine 3-4 : Préparation produit & syndication</h2><p>Trois tâches en simultané :</p><p><strong>1. Codes-barres + spécifications techniques</strong><br>Contacter GS1 pour les codes-barres : délai officiel 2 semaines, mais j'ai négocié avec une urgence (c'est possible avec une justification commerciale). Reçus en 8 jours. En parallèle, définir les spécifications pour chaque retailer : poids, dimensions, prix PMPF, durée de shelf-life.</p><p><strong>2. Fiche produit maître & adaptation retailer</strong><br>J'ai créé une fiche mère : description 280 mots, 5 bénéfices clés (sans gluten, bio, protéiné, saveur authentique, texture al dente), 8 images (face, dos, en assiette, ingrédients, certifications), conseils cuisson. Puis adapté pour chaque retailer : Carrefour préfère les « conseils d'utilisation », Leclerc veut « comment bien cuire », Amazon exige des bullet points en anglais. Deux jours de travail, mais c'était critique.</p><p><strong>3. Landing page produit sur site de marque</strong><br>Une page simple : produit, bénéfices, où l'acheter (avec localisation retailers). Le <a href=\"https://www.click2buy.com/fr/blog/where-to-buy-definition-enjeux-strategie/\" style=\"font-weight:bold; color:#EA4E30;\">where-to-buy</a> widget a été intégré avec un moteur de géolocalisation : « Tapez votre code postal, on vous indique où acheter ». C'est basique, mais ça change tout pour la conversion.</p><h2>Semaine 5-6 : Négociations retailers & onboarding</h2><p>C'est là que ça se corse. Pastina a une relation de 3 ans avec Carrefour (achat basique), mais pas pour ce nouveau SKU. J'ai préparé un memo simple : le marché udon explose, les sans gluten croissent à +15% par an, votre shopper bio attend ça, on tire une semaine sans marge pour vous prouver la demande.</p><p>Résultats des 8 appels :</p><table><tr><th>Retailer</th><th>Temps négociation</th><th>Condition clé</th><th>Go-live date</th></tr><tr><td>Carrefour</td><td>12 jours</td><td>3 semaines sans marge, étiquetage rayoniste</td><td>J+42</td></tr><tr><td>Leclerc</td><td>5 jours</td><td>Référencement direct, pas de condition</td><td>J+18</td></tr><tr><td>Intermarché</td><td>8 jours</td><td>Prix PMPF validé, PLV fournie</td><td>J+25</td></tr><tr><td>Système U</td><td>7 jours</td><td>Accord central, à déployer en magasins</td><td>J+35</td></tr><tr><td>Bio C'Bon</td><td>3 jours</td><td>Alignement valeurs bio, priorité</td><td>J+12</td></tr><tr><td>Amazon</td><td>4 jours</td><td>Envoi FBA dès semaine 2, pricing agressif</td><td>J+8</td></tr><tr><td>Cdiscount</td><td>2 jours</td><td>Référencement marketplace, pas d'achat garanti</td><td>J+3</td></tr><tr><td>Spécialisé local</td><td>1 jour</td><td>Partenaire existant, expansion naturelle</td><td>J+5</td></tr></table><p>Clé de succès : chaque négociation a été menée par la bonne personne. Mon responsable commercial a parlé à Carrefour (respect hiérarchique). Moi j'ai géré Amazon et Cdiscount (plus agiles). La co-fondatrice a appelé Bio C'Bon (alignment valeurs, très efficace).</p><h2>Semaine 7-8 : Activation & Résultats</h2><p>Jour 8 : Cdiscount en live (marketplace, zéro stock investissement). Jour 12 : Bio C'Bon va-t-il performer ? Oui. 18 paquets vendus en 3 jours. Signal positif. Jour 18 : Leclerc en rayon, e-commerce live. Stock initial consommé en 2 semaines. Jour 42 : Carrefour (finalement plus rapide que prévu, J+38).</p><p>Au jour 60 (fin février 2025), voici l'état :</p><ul><li>8 retailers live : <strong>Amazon, Cdiscount, spécialisé local, Bio C'Bon, Leclerc, Intermarché, Système U, Carrefour</strong></li><li>Stock total distribué : 8 400 unités (valeur = ~€35k)</li><li>Ventes jour 1-60 : 5 200 unités vendues</li><li>Ventes par retailer : Amazon 28%, Bio C'Bon 22%, Leclerc 19%, Carrefour 16%, Intermarché 8%, Système U 4%, Cdiscount 2%, Local 1%</li><li>Taux de conversion « landed cost to vente » : 62% en 2 mois</li></ul><h2>Learnings clés</h2><p>Réflexions à avoir avant de déployer votre propre stratégie WTB rapide :</p><p><strong>1. Priorisez, ne démocratisez pas</strong><br>Huit retailers en 60 jours, c'est intense. J'aurais jamais pu faire 16. On a choisi les vrais leviers : Carrefour et Leclerc font 55% des ventes potentielles. E-commerce en vaut 25%. Spécialisé 15%. Le reste est du bruit. Concentrez vos efforts sur les 3-4 retailers qui vraiment muent.</p><p><strong>2. Parallélisez, ne sérialisez pas</strong><br>Codes-barres, préparation produit, négociations, création de contenu = tout en même temps. Si vous attendez que les codes barres soient prêts avant de parler à Carrefour, vous avez perdu 3 semaines. Versez l'urgence en parallèle.</p><p><strong>3. Mesurez pour adapter</strong><br>À jour 30, on savait déjà qu'Amazon surperformait (28% prévus vs 20%). On a renforcé le budget PPC Amazon. Bio C'Bon sous-performait au départ (5% ventes), mais c'était juste un problème de placement rayon. Correction : relocalisation + PLV + email retailer = résultat remonté à 22%. Sans mesure rapide, on aurait pas corrigé.</p><p><strong>4. Utilisez <a href=\"https://www.click2buy.com/fr/blog/optimiser-taux-conversion-distributeurs/\" style=\"font-weight:bold; color:#EA4E30;\">le taux de conversion distributeur comme KPI de pilotagé</a></strong><br>Pastina n'avait pas de visibility sur le nombre de consommateurs qui cherchaient leur produit vs qui l'achetaient réellement chez chaque retailer. On a commencé à tracker ça à partir de J+15. Résultat : chez Leclerc, 12% des visiteurs « udon bio » achetaient. Chez Carrefour, 8%. On a demandé à Leclerc pourquoi (réponse : meilleur positionnement shelf). Carrefour a corrigé. Trois semaines plus tard : taux passé de 8% à 11%. C'est ce taux qui pilote tout.</p><p><strong>5. L'après-60 jours c'est plus dur</strong><br>Lancer est glamour. Pérenniser est morose. À jour 60, Pastina a fait la belle. À jour 180, l'enjeu réel émerge : comment garder ces 8 retailers heureux ? Comment passer de 62% de taux de conversion à 75% ? Comment monter en PDM volume (ils ont 0,8% du marché udon, ils veulent 2% en 12 mois) ? C'est là qu'une vraie stratégie d'optimisation continue s'impose. Mesure quotidienne, test A/B de prix, ajustement PLV, analyse concurrence.</p><p>Pastina a réussi son coup. En 60 jours, ils ont d'un business monocanal (un spécialisé) à une vraie présence omnicanal (8 retailers) représentant 80% du marché potentiel français. C'est plus que beaucoup de marques bio. Mais ça a demandé, chaque jour, de choisir les vraies priorités et d'ignorer le bruit. Pas de perfection. De l'exécution.</p>"

<script>
const ARTICLES = JSON.parse(document.getElementById('articles-data').textContent);

let activeId = null;

function getStatusLabel(status) {
  return status === 'published' ? 'Publié' : 'En cours';
}

function getBadgeClass(status) {
  return status === 'published' ? 'badge-green' : 'badge-blue';
}

function toggleStatus(article) {
  article.status = article.status === 'published' ? 'in_progress' : 'published';
  render();
  if (activeId === article.id) showDetail(article);
}

function copyText(text, btn) {
  navigator.clipboard.writeText(text).then(() => {
    btn.textContent = '✓ Copié';
    btn.classList.add('copied');
    setTimeout(() => { btn.textContent = 'Copier'; btn.classList.remove('copied'); }, 2000);
  });
}

function showDetail(article) {
  activeId = article.id;
  document.querySelectorAll('.article-card').forEach(c => c.classList.toggle('active', parseInt(c.dataset.id) === article.id));

  const panel = document.getElementById('detailPanel');
  panel.className = 'detail-panel';

  const keywords = article.keywords ? article.keywords.split(',').map(k => k.trim()).filter(Boolean) : [];
  const metaLen = article.metaDescription ? article.metaDescription.length : 0;

  panel.innerHTML = `
    <div class="detail-header">
      <div class="detail-article-title">${article.h1 || article.title}</div>
      <div class="detail-badge">
        <span class="badge ${getBadgeClass(article.status)}" onclick="toggleStatus(ARTICLES.find(a=>a.id===${article.id})); event.stopPropagation()">
          ${getStatusLabel(article.status)}
        </span>
      </div>
    </div>
    <div class="detail-body">

      ${keywords.length ? `
      <div class="detail-section">
        <div class="detail-section-label">🔑 Mots-clés SEO (${keywords.length})</div>
        <div class="keywords-wrap">
          ${keywords.map(k => `<span class="keyword-chip">${k}</span>`).join('')}
        </div>
      </div>` : ''}

      ${article.metaDescription ? `
      <div class="detail-section">
        <div class="detail-section-label">📝 Méta-description</div>
        <div class="meta-box">${article.metaDescription}</div>
        <div class="char-count">${metaLen} caractères ${metaLen < 140 ? '⚠️ trop court' : metaLen > 160 ? '⚠️ trop long' : '✅'}</div>
      </div>` : ''}

      ${article.h1 ? `
      <div class="detail-section">
        <div class="detail-section-label">🏷️ Titre H1</div>
        <div class="copy-field">
          <div class="copy-field-text">${article.h1}</div>
          <button class="copy-btn" onclick="copyText('${article.h1.replace(/'/g, "\\'")}', this)">Copier</button>
        </div>
      </div>` : ''}

      ${article.slug ? `
      <div class="detail-section">
        <div class="detail-section-label">🔗 Slug WordPress</div>
        <div class="copy-field">
          <div class="copy-field-text">${article.slug}</div>
          <button class="copy-btn" onclick="copyText('${article.slug}', this)">Copier</button>
        </div>
      </div>` : ''}

      ${article.html ? `
      <div class="detail-section">
        <div class="detail-section-label">📄 Code HTML WordPress</div>
        <div class="code-wrap">
          <pre class="code-box" id="code-${article.id}">${escapeHtmlDisplay(article.html)}</pre>
          <button class="code-copy-btn" onclick="copyHtml(${article.id}, this)">📋 Copier le code</button>
        </div>
      </div>` : ''}

    </div>
  `;
}

function escapeHtmlDisplay(str) {
  return str.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');
}

function copyHtml(id, btn) {
  const article = ARTICLES.find(a => a.id === id);
  if (!article) return;
  navigator.clipboard.writeText(article.html).then(() => {
    btn.textContent = '✓ Copié !';
    btn.classList.add('copied');
    setTimeout(() => { btn.textContent = '📋 Copier le code'; btn.classList.remove('copied'); }, 2500);
  });
}

function render() {
  const published = ARTICLES.filter(a => a.status === 'published');
  const inProgress = ARTICLES.filter(a => a.status === 'in_progress');

  const listPanel = document.getElementById('listPanel');

  if (ARTICLES.length === 0) {
    listPanel.innerHTML = '<div class="no-articles">Aucun article pour le moment.</div>';
    return;
  }

  let html = '';

  if (published.length) {
    html += `<div class="section-title">✅ Publiés (${published.length})</div>`;
    html += published.map(a => articleCard(a)).join('');
  }

  if (inProgress.length) {
    html += `<div class="section-title section-divider">🔵 En cours (${inProgress.length})</div>`;
    html += inProgress.map(a => articleCard(a)).join('');
  }

  listPanel.innerHTML = html;

  // Stats
  document.getElementById('stats').innerHTML = `
    <span><span class="dot dot-green"></span>${published.length} publiés</span>
    <span><span class="dot dot-blue"></span>${inProgress.length} en cours</span>
  `;
}

function articleCard(article) {
  return `<div class="article-card${activeId === article.id ? ' active' : ''}" data-id="${article.id}" onclick="showDetail(ARTICLES.find(a=>a.id===${article.id}))">
    <div class="article-title">${article.title}</div>
    <span class="badge ${getBadgeClass(article.status)}" onclick="toggleStatus(ARTICLES.find(a=>a.id===${article.id})); event.stopPropagation()">${getStatusLabel(article.status)}</span>
  </div>`;
}

render();
</script>
